<!DOCTYPE html>
<html data-theme="light" lang="ja">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Product 02 - Repost Service</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
<style>
    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #fff;
        box-sizing: border-box;
    }

    /* スライドのコードサイズ（2667×1500）。表示領域に合わせてスケールする */
    .slide-print-wrapper {
        width: 2667px;
        height: 1500px;
        flex-shrink: 0;
        box-sizing: border-box;
        font-family: 'Noto Sans JP', sans-serif;
        background-color: #ffffff;
        display: flex;
        flex-direction: column;
        transform-origin: center center;
        transform: scale(min(100vw / 2667, 100vh / 1500));
    }

    /* Main color palette: #0d6aeb */
    .text-brand-main { color: #0d6aeb; }
    .bg-brand-main { background-color: #0d6aeb; }
    .bg-brand-light { background-color: #eef6ff; }
    .border-brand-main { border-color: #0d6aeb; }
    .text-brand-dark { color: #003366; }

    /* Shadow and Cards */
    .card-shadow { box-shadow: 0 10px 40px -5px rgba(13, 106, 235, 0.1); }
    .glass-effect {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
    }
    
    /* Typography */
    .font-noto { font-family: 'Noto Sans JP', sans-serif; }
    .title-large { font-size: 80px; font-weight: 900; line-height: 1.2; }
    .subtitle-medium { font-size: 40px; font-weight: 500; color: #666; }
    .section-title { font-size: 48px; font-weight: 700; }
    .desc-text { font-size: 32px; line-height: 1.5; color: #444; }

    /* Layout Specifics */
    .phone-mockup {
        border-radius: 40px;
        overflow: hidden;
        border: 12px solid #333;
        background: #fff;
        box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        position: relative;
    }
    
    .comparison-box {
        border-radius: 40px;
        padding: 60px;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
    }
    
    /* Custom dashed line for flow visualization */
    .dashed-line {
        border-left: 4px dashed #0d6aeb;
        position: absolute;
    }
    
    .step-box {
        background-color: white;
        border: 3px solid #0d6aeb;
        border-radius: 16px;
        padding: 15px 40px;
        font-weight: 700;
        font-size: 32px;
        color: #0d6aeb;
        text-align: center;
        box-shadow: 0 8px 20px rgba(13, 106, 235, 0.15);
    }

    /* Product Label */
    .product-label {
        font-size: 32px;
        font-weight: 700;
        color: #333;
        margin-bottom: 20px;
        display: inline-block;
        border-left: 8px solid #0d6aeb;
        padding-left: 20px;
    }

    /* Button/Label Styles */
    .blue-label {
        background-color: #0d6aeb;
        color: white;
        padding: 15px 40px;
        border-radius: 12px;
        font-size: 36px;
        font-weight: 700;
        display: inline-block;
        box-shadow: 0 8px 16px rgba(13, 106, 235, 0.3);
    }
    
    .white-box-label {
        background-color: white;
        border: 3px solid #0d6aeb;
        color: #0d6aeb;
        padding: 15px 40px;
        border-radius: 12px;
        font-size: 36px;
        font-weight: 700;
        display: inline-block;
    }
    
    /* 印刷用CSS: ブラウザ印刷・PDF生成エンジン用 */
    @media print {
        @page {
            size: A4 landscape;
            margin: 0;
        }
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            width: 100% !important;
            min-height: 100% !important;
            overflow: visible !important;
            box-sizing: border-box;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
            page-break-after: avoid;
            page-break-inside: avoid;
        }
        .slide-print-wrapper {
            width: 2667px !important;
            height: 1500px !important;
            transform: scale(0.42);
            transform-origin: top left;
            flex-shrink: 0;
            page-break-inside: avoid;
        }
    }
</style>
</head>
